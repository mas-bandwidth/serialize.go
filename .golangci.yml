version: "2"

linters:
  default: standard
  enable:
    - misspell
    - unconvert
  exclusions:
    rules:
      # the documented sticky error pattern intentionally leaves serialize call
      # errors unchecked in straight-line test and example code
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
