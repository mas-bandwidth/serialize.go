version: "2"

linters:
  default: standard
  enable:
    - errorlint
    - gocritic
    - godot
    - misspell
    - nolintlint
    - unconvert
  exclusions:
    rules:
      # the documented sticky error pattern intentionally leaves serialize call
      # errors unchecked in straight-line test and example code, and in the
      # cross language compat harness
      - path: _test\.go
        linters:
          - errcheck
      - path: ^compat/
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
