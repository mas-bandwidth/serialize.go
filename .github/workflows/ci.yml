name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # weekly: a real fuzzing session against the cached corpus, and early
    # warning when a new Go release or @latest tool breaks something
    - cron: "23 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: [stable]
        include:
          # the go.mod minimum: catches accidental use of newer stdlib API
          - os: ubuntu-latest
            go: "1.23.x"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false
      - run: go vet ./...
      - run: go test -short -race -shuffle=on ./...
      - run: go test -shuffle=on ./...
      - run: go test -run=NONE -bench=. -benchtime=100x ./...

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: go mod tidy
        run: go mod tidy -diff
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # pinned so releases with new checks break CI deliberately, not
          # randomly; bump by hand
          version: v2.12.2
      - name: modernize
        run: go run golang.org/x/tools/gopls/internal/analysis/modernize/cmd/modernize@latest ./...

  vuln:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  cross:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: test on a 32 bit platform (int is 32 bits, bit counts must stay 64 bit)
        run: GOARCH=386 go test ./...
      - name: build for a big endian platform
        run: GOOS=linux GOARCH=s390x go build ./...
      - name: build for wasm
        run: GOOS=js GOARCH=wasm go build ./...
      - name: build for wasi
        run: GOOS=wasip1 GOARCH=wasm go build ./...

  cppcompat:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: download the pinned C++ serialize.h
        run: curl -fsSL --retry 3 -o compat/cpp/serialize.h https://raw.githubusercontent.com/mas-bandwidth/serialize/v1.4.3/serialize.h
      - name: build the C++ harness
        run: c++ -O2 -std=c++17 -Wall -o compat/cpp/compat compat/cpp/compat.cpp
      - name: cross language round trip
        run: |
          go run ./compat write /tmp/go.bin
          ./compat/cpp/compat write /tmp/cpp.bin
          cmp /tmp/go.bin /tmp/cpp.bin
          go run ./compat read /tmp/cpp.bin
          ./compat/cpp/compat read /tmp/go.bin

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: test with coverage
        run: go test -coverprofile=cover.out ./...
      - name: coverage summary
        run: |
          total=$(go tool cover -func=cover.out | tail -1 | awk '{print $NF}')
          {
            echo "<details><summary>Coverage: ${total} of statements</summary>"
            echo
            echo '```'
            go tool cover -func=cover.out
            echo '```'
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"

  benchmark:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: benchmark base
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          go test -run=NONE -bench=. -count=10 -benchtime=0.2s . | tee /tmp/base.txt
      - name: benchmark head
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}
          go test -run=NONE -bench=. -count=10 -benchtime=0.2s . | tee /tmp/head.txt
      - name: compare
        run: |
          echo '## Benchmark comparison (base vs PR)' >> "$GITHUB_STEP_SUMMARY"
          echo 'Shared runners are noisy: treat small deltas as informational.' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go run golang.org/x/perf/cmd/benchstat@latest /tmp/base.txt /tmp/head.txt | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  apicompat:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: gorelease
        run: |
          BASE=$(git describe --tags --abbrev=0 origin/main)
          echo "## API compatibility vs $BASE" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go run golang.org/x/exp/cmd/gorelease@latest -base="$BASE" 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # 30s smoke on pushes and PRs; the weekly scheduled run fuzzes for real
      FUZZTIME: ${{ github.event_name == 'schedule' && '10m' || '30s' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: fuzz corpus cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build/fuzz
          # run_id keys never hit exactly, so every run restores the newest
          # corpus via the prefix and saves its grown corpus under a new key
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: fuzz-corpus-
      - run: go test -fuzz=FuzzReadStream -fuzztime=$FUZZTIME .
      - run: go test -fuzz=FuzzRoundTrip -fuzztime=$FUZZTIME .
